
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>최애 뽀모도로</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shake': 'shake 0.12s linear infinite',
            },
            keyframes: {
              shake: {
                '0%, 100%': { transform: 'translateX(0) translateY(0)' },
                '20%': { transform: 'translateX(-3px) translateY(1px) rotate(-1deg)' },
                '40%': { transform: 'translateX(3px) translateY(-1px) rotate(1deg)' },
                '60%': { transform: 'translateX(-3px) translateY(-1px) rotate(-0.5deg)' },
                '80%': { transform: 'translateX(3px) translateY(1px) rotate(0.5deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
        overflow: hidden;
      }
      ::-webkit-scrollbar {
        display: none;
      }
    </style>

}
</script>
